<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Figurinha Diferente - 3 Iguais</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#0f1220;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
.wrap{width:100%;max-width:400px}header{display:flex;justify-content:space-between;margin-bottom:10px}
.pill{background:#1a1f35;padding:6px 12px;border-radius:999px;font-size:14px;border:1px solid #2a315c}
.board{background:#1a1f35;border:1px solid #2a315c;border-radius:20px;padding:18px}
.top{display:flex;justify-content:center;margin-bottom:14px}.bottom{display:flex;gap:14px}
.sticker{flex:1;aspect-ratio:1;background:#0b1020;border:2px solid #2a315c;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:68px;cursor:pointer}
.sticker span{display:inline-block;transition:.15s}
.sticker.correct{border-color:#7cf5c7}.sticker.wrong{border-color:#ff6b6b;animation:shake .3s}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-3px)}75%{transform:translate(3px)}}
.timer{height:7px;background:#0b1020;border-radius:99px;margin:10px 0;overflow:hidden;border:1px solid #2a315c}
.bar{height:100%;width:100%;background:#7cf5c7;transition:width .1s linear}
.meta{display:flex;justify-content:space-between;font-size:12px;opacity:.8}
.footer{font-size:11px;text-align:center;margin-top:10px;opacity:.6}
.overlay{position:fixed;inset:0;background:#000c;display:none;place-items:center}
.modal{background:#1a1f35;padding:20px;border-radius:16px;text-align:center;border:1px solid #2a315c}
button{background:#7cf5c7;border:0;padding:10px 16px;border-radius:10px;font-weight:700;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<header><div class="pill">Fase <b id="fase">1</b></div><div class="pill" id="vidas">❤️❤️❤️</div><div class="pill">⭐<b id="pts">0</b></div></header>
<div class="board">
<div class="meta"><span>3 iguais, ache o detalhe</span><span id="tempo">20s</span></div>
<div class="timer"><div class="bar" id="bar"></div></div>
<div class="top"><div class="sticker" data-i="0"><span></span></div></div>
<div class="bottom"><div class="sticker" data-i="1"><span></span></div><div class="sticker" data-i="2"><span></span></div></div>
</div>
<div class="footer" id="info">Ciclo 1 • diferenças visíveis</div>
</div>
<div class="overlay" id="ov"><div class="modal"><h3 id="t"></h3><p id="m"></p><button id="bt">OK</button></div></div>
<script>
const emojis=['🐶','🍎','⚽','🚗','🌻','🎸','🍕','🐱','🦋','🚀','🐢','🍩','🎲','🌙','🐸','📷','🎈','🧩','🍉','🦊'];
let fase=1,pts=0,vidas=3,pen=0,timer,idxDif=0,lock=false;
const $f=document.getElementById('fase'),$p=document.getElementById('pts'),$v=document.getElementById('vidas'),$t=document.getElementById('tempo'),$b=document.getElementById('bar'),$info=document.getElementById('info');
const sticks=[...document.querySelectorAll('.sticker')];

function ciclo(f){return Math.floor((f-1)/20)} // 0,1,2...
function intensidade(f){const c=ciclo(f);return Math.max(0.2,1/(c+1))} // nunca zera

function detalhe(f){
 const inten=intensidade(f);
 const tipos=['left','menor','espelho','giro','opaco'];
 const tipo=tipos[f%5];
 // valores diminuem com o ciclo
 const left=Math.max(2,8*inten); // px
 const scale=Math.max(0.96,1-0.06*inten);
 const giro=Math.max(1.5,6*inten); // deg
 const opac=Math.max(0.88,1-0.1*inten);
 if(tipo==='left') return `translateX(-${left}px)`;
 if(tipo==='menor') return `scale(${scale})`;
 if(tipo==='espelho') return `scaleX(-1) scale(${0.99})`; // espelha
 if(tipo==='giro') return `rotate(${giro}deg)`;
 return `opacity(${opac})`;
}

function tempo(f){return Math.max(8,20-Math.floor((f-1)*0.35))}

function iniciar(){
 lock=false;$f.textContent=fase;$p.textContent=pts;$v.textContent='❤️'.repeat(vidas)+'🤍'.repeat(3-vidas);
 const c=ciclo(fase)+1;$info.textContent=`Ciclo ${c} • ${c===1?'fácil':c===2?'médio':c===3?'difícil':'insano'}`;
 const base=emojis[(fase-1)%emojis.length]; idxDif=Math.floor(Math.random()*3);
 const tf=detalhe(fase);
 sticks.forEach((s,i)=>{const sp=s.querySelector('span');s.className='sticker';sp.textContent=base;sp.style.transform='';sp.style.opacity='1';if(i===idxDif){sp.style.transform=tf; if(tf.includes('opacity'))sp.style.opacity=tf.match(/[\d.]+/)[0]}});
 const tb=Math.max(5,tempo(fase)-pen);let rest=tb;$t.textContent=tb+'s';$b.style.width='100%';
 clearInterval(timer);const ini=Date.now();
 timer=setInterval(()=>{rest=Math.max(0,tb-(Date.now()-ini)/1000);$t.textContent=Math.ceil(rest)+'s';$b.style.width=rest/tb*100+'%';if(rest<=0){clearInterval(timer);erro('Tempo')}},100);
}

function acerto(s){if(lock)return;lock=true;clearInterval(timer);s.classList.add('correct');pts+=10;pen=0;setTimeout(()=>{fase++;iniciar()},400)}
function erro(msg){if(lock)return;lock=true;clearInterval(timer);vidas--;sticks[idxDif].classList.add('correct');sticks.forEach((x,i)=>i!==idxDif&&x.classList.add('wrong'));pen+=2;setTimeout(()=>{if(vidas<=0){document.getElementById('t').textContent='Game Over';document.getElementById('m').textContent=`${msg} na fase ${fase}. Pontos: ${pts}`;document.getElementById('ov').style.display='grid'}else{iniciar()}},600)}

sticks.forEach((s,i)=>s.onclick=()=>i===idxDif?acerto(s):erro('Errou'));
document.getElementById('bt').onclick=()=>{document.getElementById('ov').style.display='none';if(vidas<=0){fase=1;pts=0;vidas=3;pen=0}iniciar()};

iniciar();
</script>
</body>
</html>
