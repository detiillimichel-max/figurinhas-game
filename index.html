<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Encontre a Figurinha Diferente - Jogo Infantil</title>
<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e2a3a, #0f1724);
    font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }

  .game-container {
    width: 100%;
    max-width: 500px;
    background: rgba(10, 20, 30, 0.6);
    border-radius: 64px;
    padding: 16px;
    backdrop-filter: blur(2px);
  }

  .info-panel {
    display: flex;
    justify-content: space-between;
    background: #1e2f3c;
    padding: 12px 20px;
    border-radius: 60px;
    margin-bottom: 20px;
    border: 2px solid #ffb347;
    box-shadow: 0 6px 0 #7a3e0f;
  }

  .info-card {
    background: #0f1a24;
    padding: 6px 16px;
    border-radius: 40px;
    color: #ffdd99;
    font-weight: bold;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: inset 0 1px 2px #ffffff30, 0 2px 4px #00000040;
  }

  .info-card span:first-child {
    font-size: 1.3rem;
  }

  .board {
    background: #2a3f4e;
    border-radius: 48px;
    padding: 24px 20px;
    border: 3px solid #ffb347;
    box-shadow: 0 12px 0 #7a3e0f;
  }

  .sticker-row {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .top-row {
    margin-bottom: 24px;
  }

  .sticker {
    flex: 1;
    aspect-ratio: 1 / 1;
    background: #fef7e0;
    border-radius: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    cursor: pointer;
    transition: all 0.08s linear;
    border: 4px solid #ffcf9a;
    box-shadow: 0 8px 0 #aa7744;
  }

  .sticker:active {
    transform: scale(0.96);
    box-shadow: 0 3px 0 #aa7744;
  }

  .sticker span {
    display: inline-block;
    transition: all 0.05s ease;
  }

  /* feedback visual */
  .sticker.correct {
    border-color: #8effb2;
    box-shadow: 0 0 0 4px #8effb2, 0 6px 0 #2c6e3a;
    background: #e0ffe8;
  }

  .sticker.wrong {
    border-color: #ff9e8f;
    box-shadow: 0 0 0 4px #ff9e8f, 0 6px 0 #a13e2a;
    background: #ffe0db;
    animation: shakeW 0.2s ease-in-out;
  }

  @keyframes shakeW {
    0% { transform: translateX(0); }
    25% { transform: translateX(-7px); }
    75% { transform: translateX(7px); }
  }

  .timer-section {
    margin-top: 20px;
    background: #0f1a24;
    border-radius: 40px;
    padding: 8px 16px;
  }

  .timer-label {
    display: flex;
    justify-content: space-between;
    font-size: 1rem;
    font-weight: bold;
    color: #ffd966;
    margin-bottom: 6px;
  }

  .timer-bar-bg {
    background: #2d3e4b;
    height: 14px;
    border-radius: 30px;
    overflow: hidden;
    border: 1px solid #ffb347;
  }

  .timer-fill {
    width: 100%;
    height: 100%;
    background: #ffb347;
    border-radius: 30px;
    transition: width 0.05s linear;
  }

  .footer-hint {
    text-align: center;
    margin-top: 20px;
    font-size: 1rem;
    font-weight: bold;
    background: #ffe6b3;
    display: inline-block;
    width: auto;
    padding: 6px 18px;
    border-radius: 60px;
    color: #a55117;
    margin-left: auto;
    margin-right: auto;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: #000000bb;
    backdrop-filter: blur(5px);
    display: none;
    place-items: center;
    z-index: 200;
  }

  .modal {
    background: #fffaec;
    padding: 30px 20px;
    border-radius: 56px;
    text-align: center;
    max-width: 280px;
    width: 80%;
    border: 4px solid #ffb347;
    box-shadow: 0 15px 0 #aa7744;
  }

  .modal h3 {
    font-size: 2rem;
    margin: 0 0 8px;
    color: #d4520c;
  }

  .modal p {
    font-size: 1.2rem;
    color: #2f4858;
    font-weight: bold;
  }

  .modal button {
    background: #ffb347;
    border: none;
    padding: 12px 28px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 40px;
    margin-top: 12px;
    cursor: pointer;
    color: #2d1f00;
    transition: 0.05s linear;
    box-shadow: 0 5px 0 #a1530a;
  }

  .modal button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #a1530a;
  }

  @media (max-width: 450px) {
    .sticker { font-size: 65px; }
    .info-card { font-size: 1rem; padding: 4px 12px; }
    .board { padding: 16px; }
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="info-panel">
    <div class="info-card"><span>⭐</span> <b id="pontosText">0</b></div>
    <div class="info-card"><span>❤️</span> <b id="vidasText">3</b></div>
    <div class="info-card"><span>🌀</span> <b id="faseText">1</b></div>
  </div>

  <div class="board">
    <div class="sticker-row top-row">
      <div class="sticker" data-idx="0"><span id="stick0">🐼</span></div>
    </div>
    <div class="sticker-row">
      <div class="sticker" data-idx="1"><span id="stick1">🐼</span></div>
      <div class="sticker" data-idx="2"><span id="stick2">🐼</span></div>
    </div>

    <div class="timer-section">
      <div class="timer-label">
        <span>⏱️ TEMPO RESTANTE</span>
        <span id="timerDisplay">00</span>
      </div>
      <div class="timer-bar-bg">
        <div class="timer-fill" id="timerBar"></div>
      </div>
    </div>
  </div>
  <div class="footer-hint" id="dicaNivel">
    🔍 ENCONTRE A FIGURINHA DIFERENTE! 🔍
  </div>
</div>

<div class="overlay" id="gameOverlay">
  <div class="modal">
    <h3 id="modalTitle">FIM DE JOGO</h3>
    <p id="modalMessage">Você conseguiu muitos pontos!</p>
    <button id="restartButton">🔁 JOGAR DE NOVO</button>
  </div>
</div>

<script>
  // ======================== LISTA DE EMOJIS DIVERTIDOS ====================
  const emojis = [
    '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯',
    '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐴', '🦄',
    '🐌', '🐝', '🐞', '🦋', '🍎', '🍕', '🚗', '⚽', '🎈', '⭐'
  ];

  // Variáveis do jogo
  let faseAtual = 1;
  let pontos = 0;
  let vidas = 3;
  let penalidadeSegundos = 0;
  let tempoRestante = 0;
  let timerIntervalo = null;
  let indiceDiferente = -1;
  let jogoBloqueado = false;

  // Elementos DOM
  const faseEl = document.getElementById('faseText');
  const pontosEl = document.getElementById('pontosText');
  const vidasEl = document.getElementById('vidasText');
  const timerDisplay = document.getElementById('timerDisplay');
  const timerBar = document.getElementById('timerBar');
  const dicaEl = document.getElementById('dicaNivel');
  const sticksElements = [
    document.getElementById('stick0'),
    document.getElementById('stick1'),
    document.getElementById('stick2')
  ];
  const stickersDivs = document.querySelectorAll('.sticker');

  // ========== FUNÇÃO QUE CRIA UMA DIFERENÇA BEM VISÍVEL PARA CRIANÇAS ==========
  // NUNCA será muito sutil. Valores exagerados para garantir percepção imediata.
  function gerarEstiloDiferente(fase) {
    // Dificuldade aumenta bem devagar, mas a diferença continua CLARA
    // ciclo a cada 15 fases fica um pouco mais desafiador mas ainda óbvio
    let ciclo = Math.floor((fase - 1) / 15);
    let forca = 1.0;
    if (ciclo === 0) forca = 1.0;      // diferenças enormes
    else if (ciclo === 1) forca = 0.85; // ainda muito visível
    else if (ciclo === 2) forca = 0.7;
    else forca = 0.6;                  // máximo de sutileza, mas nunca menor que 0.6

    // Tipos de diferenças divertidas (todas muito perceptíveis)
    const tipos = [
      'DESLOCAR',     // andar para o lado
      'ENCOLHER',     // ficar bem menor
      'GIRAR',        // rodar bastante
      'ESPELHAR',     // imagem invertida
      'FLUTUAR'       // subir/descer + opacidade
    ];
    let tipo = tipos[(fase - 1) % tipos.length];
    
    // valores mínimos altos para crianças
    let deslocX = Math.floor(18 * forca);
    let escala = 0.65 + (1 - forca) * 0.2;  // entre 0.65 e 0.85
    let rotacao = 18 * forca;               // entre 10° e 18°
    let opacidade = 0.55 + (1 - forca) * 0.2; // entre 0.55 e 0.75
    
    // garantias de que a diferença NUNCA suma
    deslocX = Math.max(14, deslocX);
    escala = Math.min(0.85, Math.max(0.65, escala));
    rotacao = Math.max(12, rotacao);
    opacidade = Math.max(0.55, opacidade);
    
    // inverte sinal às vezes
    const sinal = (Math.floor(fase / 2) % 2 === 0) ? 1 : -1;
    
    switch(tipo) {
      case 'DESLOCAR':
        return `transform: translateX(${sinal * deslocX}px);`;
      case 'ENCOLHER':
        return `transform: scale(${escala});`;
      case 'GIRAR':
        return `transform: rotate(${sinal * rotacao}deg);`;
      case 'ESPELHAR':
        return `transform: scaleX(-1) scale(0.92);`; // espelhado + leve redução
      case 'FLUTUAR':
        return `transform: translateY(-${deslocX * 0.7}px); opacity: ${opacidade};`;
      default:
        return `transform: translateX(${deslocX}px);`;
    }
  }

  // Calcula o tempo base com penalidade (sempre entre 8 e 18 segundos)
  function obterTempoLimite() {
    let base = 18 - Math.floor((faseAtual - 1) * 0.2);
    if (base < 8) base = 8;
    let comPenalidade = base - penalidadeSegundos;
    if (comPenalidade < 5) comPenalidade = 5;
    return Math.floor(comPenalidade);
  }

  // Atualizar interface das vidas
  function atualizarVidasUI() {
    vidasEl.textContent = vidas;
  }

  // Finalizar rodada com erro (criança errou ou tempo acabou)
  function finalizarComErro(motivo) {
    if (jogoBloqueado) return;
    jogoBloqueado = true;
    if (timerIntervalo) clearInterval(timerIntervalo);
    
    // mostrar qual era a correta e marcar as erradas
    stickersDivs.forEach((div, idx) => {
      if (idx === indiceDiferente) {
        div.classList.add('correct');
      } else {
        div.classList.add('wrong');
      }
    });
    
    vidas--;
    penalidadeSegundos += 2; // erro aumenta penalidade
    atualizarVidasUI();
    
    if (vidas <= 0) {
      // Game Over
      setTimeout(() => {
        document.getElementById('modalTitle').textContent = '💔 FIM DE JOGO 💔';
        document.getElementById('modalMessage').innerHTML = `${motivo}<br>⭐ Pontuação final: ${pontos} pontos<br>✨ Você chegou à fase ${faseAtual}`;
        document.getElementById('gameOverlay').style.display = 'grid';
      }, 500);
      return;
    }
    
    // Recomeça a mesma fase após pequeno delay
    setTimeout(() => {
      iniciarFase();
    }, 700);
  }

  // Ação de acertar a figurinha diferente
  function acertar(stickerDiv, idx) {
    if (jogoBloqueado) return;
    if (idx !== indiceDiferente) return;
    
    jogoBloqueado = true;
    if (timerIntervalo) clearInterval(timerIntervalo);
    
    stickerDiv.classList.add('correct');
    pontos += 10;
    penalidadeSegundos = Math.max(0, penalidadeSegundos - 1);
    pontosEl.textContent = pontos;
    
    // Avança para a próxima fase
    setTimeout(() => {
      faseAtual++;
      iniciarFase();
    }, 400);
  }

  // Iniciar uma nova fase (configurar a diferença e o temporizador)
  function iniciarFase() {
    // Resetar bloqueio e estilos dos stickers
    jogoBloqueado = false;
    stickersDivs.forEach(div => {
      div.classList.remove('correct', 'wrong');
    });
    
    // Atualizar textos da interface
    faseEl.textContent = faseAtual;
    pontosEl.textContent = pontos;
    atualizarVidasUI();
    
    // Escolher emoji da fase (baseado na fase)
    const indiceEmoji = (faseAtual - 1) % emojis.length;
    const emojiBase = emojis[indiceEmoji];
    
    // Definir qual sticker será o diferente (0,1,2)
    indiceDiferente = Math.floor(Math.random() * 3);
    
    // Aplicar o mesmo emoji em todos os 3 stickers
    for (let i = 0; i < sticksElements.length; i++) {
      sticksElements[i].textContent = emojiBase;
      // Remover qualquer estilo inline residual
      sticksElements[i].style.cssText = '';
    }
    
    // Aplicar a diferença APENAS no sticker diferente
    const estiloDiferenciado = gerarEstiloDiferente(faseAtual);
    const stickerAlvo = sticksElements[indiceDiferente];
    // estilos inline diretos (sem conflito)
    stickerAlvo.style.cssText = estiloDiferenciado;
    
    // garantir que o transform e opacity coexistam
    if (!estiloDiferenciado.includes('opacity')) {
      stickerAlvo.style.opacity = '1';
    }
    
    // Dica de dificuldade na parte inferior
    let cicloAtual = Math.floor((faseAtual - 1) / 15) + 1;
    if (cicloAtual === 1) dicaEl.innerHTML = '🔍 FÁCIL - A DIFERENÇA É BEM GRANDE! 🔍';
    else if (cicloAtual === 2) dicaEl.innerHTML = '⚡ MÉDIO - AINDA DÁ PRA VER BEM A DIFERENÇA ⚡';
    else if (cicloAtual === 3) dicaEl.innerHTML = '🔥 DIFÍCIL - OLHE COM CUIDADO, MAS DÁ PRA VER! 🔥';
    else dicaEl.innerHTML = '🌀 INSANO - FOCO TOTAL, A FIGURA DIFERENTE EXISTE! 🌀';
    
    // Configurar temporizador
    const tempoMaximo = obterTempoLimite();
    tempoRestante = tempoMaximo;
    timerDisplay.textContent = `${tempoRestante}s`;
    timerBar.style.width = '100%';
    
    if (timerIntervalo) clearInterval(timerIntervalo);
    const inicio = Date.now();
    
    timerIntervalo = setInterval(() => {
      if (jogoBloqueado) return;
      const decorrido = (Date.now() - inicio) / 1000;
      let restante = tempoMaximo - decorrido;
      if (restante <= 0) {
        clearInterval(timerIntervalo);
        if (!jogoBloqueado) {
          finalizarComErro('⏰ TEMPO ESGOTADO!');
        }
      } else {
        const percent = (restante / tempoMaximo) * 100;
        timerBar.style.width = `${percent}%`;
        timerDisplay.textContent = `${Math.ceil(restante)}s`;
      }
    }, 80);
  }

  // Configurar eventos de clique nos stickers
  stickersDivs.forEach((div, idx) => {
    div.addEventListener('click', (e) => {
      e.stopPropagation();
      if (jogoBloqueado) return;
      if (idx === indiceDiferente) {
        acertar(div, idx);
      } else {
        finalizarComErro('😕 VOCÊ TOCOU NA FIGURINHA ERRADA!');
      }
    });
  });

  // Reiniciar o jogo completo
  function reiniciarJogo() {
    faseAtual = 1;
    pontos = 0;
    vidas = 3;
    penalidadeSegundos = 0;
    jogoBloqueado = false;
    if (timerIntervalo) clearInterval(timerIntervalo);
    document.getElementById('gameOverlay').style.display = 'none';
    iniciarFase();
  }

  document.getElementById('restartButton').addEventListener('click', reiniciarJogo);
  
  // Iniciar jogo pela primeira vez
  iniciarFase();
</script>
</body>
  </html>
